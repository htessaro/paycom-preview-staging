        '200':
          description: Returns the authentication session object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Unique identifier for the Authentication Session.
                    example: sca_296645958265997312
                  resource:
                    type: string
                    enum:
                      - authentication_session
                    description: The resource type.
                    example: authentication_session
                  client_secret:
                    type: string
                    description: Client secret for use in the frontend SDK.
                    example: sca_secret_abc123xyz
                  return_url:
                    type: string
                    description: The return URL for redirects.
                    example: https://example.com/checkout/complete
                  duration:
                    type: string
                    description: Session duration.
                    example: 15m
                  created:
                    type: string
                    format: date-time
                    description: Time the session was created.
                    example: '2024-01-15T10:30:00Z'
                  status:
                    type: string
                    description: Current status of the session.
                    example: pending
              example:
                id: sca_296645958265997312
                resource: authentication_session
                client_secret: sca_secret_abc123xyz
                return_url: https://example.com/checkout/complete
                duration: 15m
                created: '2024-01-15T10:30:00Z'
                status: pending
