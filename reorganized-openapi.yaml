  /sessions/authentication/linked:
    post:
      summary: Create a Linked Authentication Session
      description: Creates a 3D Secure authentication session linked to an existing charge, hold, or payment method.
      operationId: create-linked-authentication-session
      tags:
        - AuthenticationSessions
      parameters:
        - $ref: '#/components/parameters/idempotency-key'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resource
                - return_url
              properties:
                resource:
                  type: string
                  pattern: ^(chrg_|hld_|pm_card_)\d+$
                  description: The ID of the charge, hold, or payment method to authenticate.
                  example: chrg_296645958265997312
                return_url:
                  type: string
                  format: uri
                  description: URL to redirect the user after authentication completes.
                  example: https://example.com/checkout/complete
                confirm:
                  type: boolean
                  description: Whether to automatically confirm the related transaction after successful authentication.
