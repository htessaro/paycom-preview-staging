    create-payment-method:
      description: Create payment method.
      content:
        application/json:
          schema:
            type: object
            description: Create payment method payload object.
            required:
              - customer_reference_id
              - type
            properties:
              customer_reference_id:
                type: string
                description: A unique identifier for your customer, This is a customer ID that identifies the customer that the Payment method belongs to.
              type:
                type: string
                description: Payment method type.
                example: card
                enum:
                  - card
                  - network_token
                  - applepay
                  - googlepay
                  - token
              risk_session_id:
                type: string
                description: A unique identifier for the risk session.
              card:
                $ref: '#/components/schemas/card-details-source'
                description: Raw details of a card payment method.
              token:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    description: A token that identifies the payment method in Pay.com's Tokenization Vault.
                  cvv:
                    type: string
                    description: Card security code.
                    example: '123'
                  authentication_context:
                    $ref: '#/components/schemas/authentication-context'
              network_token:
                $ref: '#/components/schemas/network-token-source'
              googlepay:
                $ref: '#/components/schemas/googlepay-source'
              applepay:
                $ref: '#/components/schemas/applepay-source'
              billing_details:
                $ref: '#/components/schemas/billing-details'
              payment_method_options:
                $ref: '#/components/schemas/payment-method-options'
              setup_future_usage:
                type: string
                description: |-
                  Indicates that you intend to make future payments with this payment method that will be used in this Payment.

                  **Possible enum values:**
                  `on_session`
                  Use `on_session` if you intend to only reuse the payment method when your customer is present in your checkout flow.

                  `off_session`
                  Use `off_session` if your customer may or may not be present in your checkout flow.
                enum:
                  - on_session
                  - off_session
                example: on_session
              metadata:
                type: object
                description: Set of key-value pairs that you can attach to the resource.
              provision_network_token:
                type: boolean
                description: Indicates whether network token should be provisioned.
                example: true
                default: false
          example:
            customer_reference_id: cust_ext_abc123
            type: card
            card:
              number: '4242424242424242'
              expiry_month: '12'
              expiry_year: '2028'
              cvv: '123'
              name: John Smith
            billing_details:
              name: John Smith
              email: john.smith@example.com
              phone: '+14155551234'
              address:
                line1: 123 Main Street
                line2: Suite 400
                city: San Francisco
                state: CA
                postal_code: '94102'
                country: US
            setup_future_usage: on_session
            metadata:
              customer_tier: premium
