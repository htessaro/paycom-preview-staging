              type: string
              description: Universal Cardholder Authentication Field (UCAF) for JCB transaction.
            payment_account_reference:
              type: string
              description: Payment Account Reference (PAR) for JCB transaction.
            ani:
              type: object
              description: Account Name Inquiry (ANI) verification details for JCB transaction.
              properties:
                status:
                  type: string
                  description: ANI verification status code.
                full_name:
                  type: string
                  description: Full name match status code.
                first_name:
                  type: string
                  description: First name match status code.
                middle_name:
                  type: string
                  description: Middle name match status code.
                last_name:
                  type: string
                  description: Last name match status code.
      additionalProperties:
        type: object
        description: Additional network-specific properties.
      example:
        network: visa
        visa:
          arn: '74234567890123456789012'
          auth_code: '123456'
          raw_response_code: '00'
          rrn: '123456789012'
          eci: '05'
          aci: 'Y'
          payment_account_reference: ABCD1234567890123456789012345
    refund:
      description: Refund.
      required:
        - id
        - resource
        - amount
        - amount_human_readable
        - charge
        - created
        - currency
      properties:
        id:
          type: string
          description: Unique identifier for Refund object.
          examples:
            - rfnd_296645958265997314
        resource:
          type: string
          description: String representing the resource type.
          examples:
            - refund
        amount:
          type: string
          description: Amount, in minor units.
          examples:
            - 10000
        amount_human_readable:
          type: string
          description: Amount in human readable format.
          examples:
            - '100.00'
        charge:
          type: string
          description: ID of the Charge that was refunded.
          examples:
            - chrg_296645958265997312
        created:
          type: string
          description: Time at which the resource was created. ISO String format.
          examples:
            - '2024-01-15T10:30:00Z'
        currency:
          type: string
          description: Three-letter ISO currency code, in lowercase.
          examples:
            - usd
        customer:
          type: string
          description: ID of the customer this Refund is for if one exists.
          examples:
            - cust_296645958265997317
        customer_reference_id:
          type: string
          description: A unique identifier for your customer, This is a customer ID that identifies the customer that the Refund belongs to that was supplied at creation of the Charge.
          examples:
            - cust_ext_abc123
        metadata:
          type: object
          description: Set of key-value pairs that were attached to the resource at creation.
        reference:
          type: string
          description: A unique string to reference the Refund that was entered while creating the resource. Can be used to reconcile the object with your internal systems.
        status:
          type: string
          enum:
            - succeeded
            - failed
            - pending
        failure_code:
          type: string
          description: Refund failure code.
        failure_message:
          type: string
          description: Refund failure message.
        cashflow_transaction_id:
          type: string
          description: Cashflow transaction id.
        test_mode:
          type: boolean
          description: Is test mode enabled.
        underlying_network_id:
          type: string
          description: Underlying network id.
        underlying_network_details:
          $ref: '#/components/schemas/underlying-network-details'
          description: Underlying network details.
        underlying_processing_details:
          type: object
          description: Underlying processing details.
          properties:
            processor:
              type: string
            processor_transaction_id:
              type: string
            routing_key:
              type: string
    get-refunds-bulk-response:
      description: Get refunds in bulk response.
      required:
        - resource
      properties:
        resource:
          type: string
          examples:
            - refunds
          description: Resource name.
        has_more:
          type: boolean
          description: True if there are more query results.
        refunds:
          type: array
          items:
            $ref: '#/components/schemas/refund'
    validation-error:
      type: object
      description: Validation failed error.
      properties:
        error:
          type: object
          description: Error object.
          properties:
            type:
              type: string
              description: Error type.
              example: invalid_request_error
            code:
              type: string
              description: Error code.
              example: invalid_parameters
            message:
              type: string
              description: Error message.
              example: 'ValidationError: The ID provided is not a valid'
            params:
              type: array
              items:
                type: object
                properties:
                  path:
                    type: string
                    description: Invalid parameter field.
                  message:
                    type: string
                    description: Invalid parameter description.
    create-refund-request:
      type: object
      description: Request body for creating a refund.
      required:
        - charge
      properties:
        charge:
          type: string
          examples:
            - chrg_146231656762572800
          pattern: ^chrg_\d{18,20}
        amount_to_refund:
          type: string
          examples:
            - 10000
        reference:
          type: string
        metadata:
          type: object
    address:
      type: object
      description: Address details.
      properties:
        city:
          type: string
          description: City, district, suburb, town, or village.
          example: San Francisco
        country:
          type: string
          description: Two-letter country code (ISO 3166-1 alpha-2).
          example: US
          minLength: 2
          maxLength: 2
        line1:
          type: string
          description: Address line 1 (e.g., street, PO Box, or company name).
          example: 123 Main Street
        line2:
          type: string
          description: Address line 2 (e.g., apartment, suite, unit, or building).
          example: Suite 400
        postal_code:
          type: string
          description: ZIP or postal code.
          example: '94102'
        state:
          type: string
          description: State, county, province, or region.
          example: CA
    billing-details:
      type: object
      description: Billing information for the payment.
      properties:
        address:
          $ref: '#/components/schemas/address'
        name:
          type: string
          description: Full name of the billing contact.
          example: John Smith
        email:
          type: string
          description: Email address of the billing contact.
          example: john.smith@example.com
        phone:
          type: string
          description: Phone number of the billing contact in E.164 format.
          pattern: ^\+\d+
          example: '+14155551234'
        dob:
          type: string
          description: Date of birth in YYYY-MM-DD format.
          pattern: ^\d{4}-\d{2}-\d{2}$
          example: '1985-07-15'
        national_identification_number:
          type: string
          description: National identification number of the billing contact.
          example: 123-45-6789
    payout:
      description: Payout.
      required:
        - id
        - resource
        - amount
        - amount_human_readable
        - billing_details
        - created
        - currency
        - status
      properties:
        id:
          type: string
          description: Unique identifier for Payout object.
          examples:
            - po_296645958265997315
        resource:
          type: string
          description: String representing the resource type.
          enum:
            - payout
        amount:
          type: integer
          description: Amount paid, in minor units.
          examples:
            - 10000
        amount_human_readable:
          type: string
          examples:
            - '100.00'
          description: Amount in human readable format.
        billing_details:
          $ref: '#/components/schemas/billing-details'
        calculated_statement_descriptor:
          type: string
          description: The full statement descriptor that is displayed on your customers’ bank statements.
          examples:
            - PAYCOM * TEST
        created:
          type: string
          description: The date and time at which the resource was created. ISO String format.
          examples:
            - '2024-01-15T10:30:00Z'
        currency:
          type: string
          description: Three-letter ISO currency code, in lowercase.
          examples:
            - usd
        customer:
          type: string
          description: ID of the customer this Payout is for if one exists.
          examples:
            - cust_296645958265997317
        customer_reference_id:
          type: string
          description: A unique identifier for your customer, This is a customer ID that identifies the customer that the Payout belongs to.
          examples:
            - cust_ext_abc123
        cashflow_transaction:
          type: string
          description: ID of the Cashflow Transaction related to this Payout if exists.
        description:
          type: string
          description: A string attached to the resource. Often useful for displaying to users.
        failure_code:
          type: string
          description: Error code explaining reason for payout failure if available.
        failure_message:
          type: string
          description: Message to user further explaining reason for payout failure if available.
        metadata:
          type: object
          description: Set of key-value pairs that you can attach to the resource.
        payment_method:
          type: string
          description: ID of the Payout used for the Charge.
        payment_method_details:
          $ref: '#/components/schemas/payment-method-details'
        reference:
          type: string
          description: A unique string to reference the Payout that was entered while creating the resource. Can be used to reconcile the object with your internal systems.
        statement_descriptor_suffix:
          type: string
          description: Provides information about the payment that customers can see on their charge statements. Concatenated with the statement descriptor that’s set on the account during onboarding the complete statement descriptor, maximum of 22 characters for the concatenated descriptor.
          examples:
            - TEST
        status:
          type: string
          enum:
            - succeeded
            - failed
            - pending
        underlying_network_details:
          $ref: '#/components/schemas/underlying-network-details'
          description: Underlying network details.
        test_mode:
          type: boolean
          description: Indicates if transaction is from sandbox/test environment.
    get-payouts-bulk-response:
      description: Get payouts in bulk response.
      required:
        - resource
      properties:
        resource:
          type: string
          examples:
            - payouts
          description: Resource name.
        has_more:
          type: boolean
          description: True if there are more query results.
        payouts:
          type: array
          items:
            $ref: '#/components/schemas/payout'
    create-payout-request:
      type: object
      description: Request body for creating a payout.
      required:
        - amount
        - currency
        - destination
      properties:
        amount:
          type: integer
          examples:
            - 10000
          description: Amount intended to be collected by this Payout in minor units.
        currency:
          type: string
          description: Three-letter ISO currency code, in lowercase.
          examples:
            - usd
        destination:
          type: string
          description: A string attached to the resource. Often useful for displaying to users.
          examples:
            - pm_card_202779025452569600
        reference:
          type: string
          description: A unique string to reference the Payout. Can be used to reconcile the object with your internal systems.
        statement_descriptor_suffix:
          type: string
          description: Provides information about the payment that customers can see on their bank statements. Concatenated with the statement descriptor that’s set on the account during onboarding the complete statement descriptor, maximum of 22 characters for the concatenated descriptor.
        metadata:
          type: object
          description: Set of key-value pairs that you can attach to the resource. This can be useful for storing additional information about the object in a structured format.
    adjustment:
      type: object
      description: Adjustment object.
      required:
        - id
        - resource
        - settlement_id
      properties:
        id:
          type: string
          description: Unique identifier for the Adjustment.
          example: adj_296645958265997330
        resource:
          type: string
          description: String representing the object's type.
          example: adjustment
        settlement_id:
          type: string
          description: Unique identifier of the related Settlement.
          example: stlmnt_296645958265997323
        bank_transfer_reference:
          type: string
          description: Reference number for the bank transfer.
          example: PO13321OP
        currency:
          type: string
          description: Three-letter ISO currency code, in lowercase.
          example: usd
        description:
          type: string
          description: An arbitrary string describing the adjustment.
          example: Adjustment description
        identifier:
          type: string
          description: External identifier for the adjustment.
          example: adj_ext_12345
        amount:
          type: integer
          description: Adjustment amount, in the smallest currency unit.
          example: 10
        quantity:
          type: integer
          description: Number of adjustments included in the settlement.
          example: 1
        total:
          type: integer
          description: Total adjustment amount in the settlement, in the smallest currency unit.
          example: 10
        test_mode:
          type: boolean
          description: Whether the adjustment was created in test mode.
          example: true
    adjustments-list-response:
      description: Adjustments.
      type: object
      properties:
        resource:
          type: string
          description: String representing the resource type.
          example: adjustments
        data:
          type: array
          items:
            $ref: '#/components/schemas/adjustment'
          description: List of records.
        last_page:
          type: boolean
          description: Whether or not there are more pages available after this one. If false, this page is the last one.
          example: true
        page:
          type: integer
          description: Current page.
          example: 1
        total_pages:
          type: integer
          description: Total pages available.
          example: 1
        total_records:
          type: integer
          description: Total records available.
          example: 11
    underlying-processing-details:
      type: object
      description: Details about the processing of the transaction.
      properties:
        processor:
          type: string
          description: The processor that handled the transaction.
          example: stripe
        processor_transaction_id:
          type: string
          description: The transaction ID from the processor.
          example: pi_abc123xyz789
        transaction_id:
          type: string
          description: The transaction ID from the processor.
          example: txn_123456789
        routing_key:
          type: string
          description: Routing key used for the transaction.
          example: default
        settlement_account:
          type: string
          description: Settlement account ID used for the transaction.
          example: sa_296645958265997312
        settlement_account_details:
          type: object
          description: Details about the settlement account.
          properties:
            processor:
              type: string
              description: Processor for the settlement account.
              example: stripe
            currency:
              type: string
              description: Three-letter ISO currency code, in lowercase.
              example: usd
            name:
              type: string
              description: Name of the settlement account.
              example: Main Settlement Account
            entity:
              type: string
              description: Entity ID for the settlement account.
              example: ent_123456
            entity_details:
              type: object
              description: Details about the entity.
              properties:
                legal_name:
                  type: string
                  description: Legal name of the entity.
                  example: ACME Corp
                country:
                  type: string
                  description: Country of the entity.
                  example: US
        stripe:
          type: object
          description: Stripe-specific processing details.
          properties:
            connect_account_id:
              type: string
              description: Stripe Connect account ID.
              example: acct_abc123xyz789
    retry-attempts:
      type: array
      description: List of retry attempts for the charge.
      items:
        type: object
        properties:
          id:
            type: string
            description: Unique identifier for the retry attempt.
            example: retry_296645958265997312
          created:
            type: string
            description: Time at which the retry attempt was created.
            example: '2024-01-15T10:30:00Z'
          failure_code:
            type: string
            description: Error code explaining reason for retry attempt failure, if available.
            example: card_declined
          failure_message:
            type: string
            description: Message to user further explaining reason for retry attempt failure, if available.
            example: The card was declined.
          underlying_network_details:
            $ref: '#/components/schemas/underlying-network-details'
            description: Underlying network details for the retry attempt.
          underlying_network_id:
            type: string
            description: Unique transaction identifier assigned by the card network for the retry attempt.
            example: '74234567890123456789012'
          underlying_processing_details:
            $ref: '#/components/schemas/underlying-processing-details'
            description: Details about the processing of the retry attempt transaction.
