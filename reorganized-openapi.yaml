    payment-session:
      description: Payment session.
      required:
        - id
        - resource
        - amount
        - amount_human_readable
        - capture
        - currency
        - customer_reference_id
        - status
      properties:
        id:
          type: string
          description: Unique identifier for Payment Session object.
          examples:
            - ps_296645958265997318
        resource:
          type: string
          description: String representing the resource type.
          enum:
            - payment_session
        amount:
          type: number
          description: Amount, in minor units.
          examples:
            - 10000
        amount_human_readable:
          type: string
          description: Amount in human readable format.
          examples:
            - '100.00'
        billing_detais:
          $ref: '#/components/schemas/billing-details'
        capture:
          type: boolean
          description: Whether to immediately capture the payment and create a charge. Defaults to true. When false, the payment sessions issues a Hold (authorization), that will need to be captured later. Uncaptured holds expire after a set number of days (7 by default).
        charge:
          type: string
          description: Unique identifer of the Charge created from this Payment Session if capture=true.
        currency:
          type: string
          description: Three-letter ISO currency code, in lowercase.
          examples:
            - usd
        created:
          type: string
          description: Time at which the resource was created. ISO String format.
          example: '2024-01-15T10:30:00Z'
        setup_future_usage:
          type: string
          description: Indicates that you intend to make future payments with this payment method that will be used in this Payment.
          enum:
            - on_session
            - off_session
        client_secret:
          type: string
          description: Client secret to use with Pay Components to render the Payment Session.
          examples:
            - eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJAcGF5LWNvbS9wYXltZW50LWdhdGV3YXkiLCJpYXQiOjE2Mjk2NDczMjYsImV4cCI6MTY2MTE4MzMyNiwiYXVkIjoiaGkiLCJzdWIiOiJ3ZSBsb3ZlIHlvdSA6KSJ9.XK1D0v0XjcNYoQrwOeNPemCEFA6TGuHtGflyiUTtjYs
        customer:
          type: string
          description: ID of the customer this Payment Session is for if one exists.
          examples:
            - cust_296645958265997317
        customer_reference_id:
          type: string
          description: A unique identifier for your customer, This should be a customer ID that identifies the customer in your system. Used to retrieve and manage your customer's saved payment methods.
          examples:
            - cust_ext_abc123
        description:
          type: string
          description: A string attached to the resource. Often useful for displaying to users.
        failure_code:
          type: string
          description: Failure code.
        failure_reason:
          type: string
          description: Failure reason.
        hold:
          type: string
          description: Unique identifer of the Hold created from this Payment Session if capture=false.
        metadata:
          type: object
          description: Set of key-value pairs that you can attach to the resource. This can be useful for storing additional information about the object in a structured format.
        payment_method:
          type: string
          description: ID of the Payment Method used in the Payment Session.
        payment_method_details:
          $ref: '#/components/schemas/payment-method-details'
        payment_method_options:
          $ref: '#/components/schemas/payment-method-options'
        payment_method_types:
          type: array
          description: The list of payment method types that this Payment Session is allowed to use. If this is not provided, defaults to ["card"].
          items:
            type: string
            examples:
              - card
        reference:
          type: string
          description: A unique string to reference the Payment Session and the Charge/Hold created after a successful payment. Can be used to reconcile the object with your internal systems.
        shipping:
          $ref: '#/components/schemas/shipping-details'
        statement_descriptor_suffix:
          type: string
          description: Provides information about the payment that customers can see on their charge statements. Concatenated with the statement descriptor that’s set on the account during onboarding the complete statement descriptor, maximum of 22 characters for the concatenated descriptor.
        status:
          type: string
          enum:
            - open
            - completed
            - failed
          description: Status of the Payment Session.
