openapi: 3.1.0
info:
  title: Pay.com API
  version: '1.0'
  license:
    name: Pay
    url: https://pay.com
  summary: Pay.com API
  contact:
    name: Pay.com Team
    url: https://pay.com
    email: support@pay.com
  termsOfService: https://pay.com/legal/terms-and-conditions
  description: |-
    The Pay.com API is REST based and can be used to interact and manage resources.

    Pay.com API has:
    - Predictable resource-oriented URLs
    - Accepts JSON-encoded request bodies
    - Returns JSON-encoded responses

    The API uses standard HTTP response codes, authentication, and verbs.

    You can use the API in test mode, which does not affect your live data or interact with the banking networks.
servers:
  - url: https://api.sandbox.pay.com/v1
    description: Test mode (Sandbox)
  - url: https://api.pay.com/v1
    description: Live mode (Production)
security:
  - ApiKeyAuth: []
tags:
  - name: PaymentSessions
    description: Create and manage payment sessions for secure, client-side payment collection.
  - name: SetupSessions
    description: Create and manage setup sessions to securely collect and store payment method details without charging.
  - name: TokenizationSessions
    description: Create tokenization sessions for secure card collection.
  - name: Charges
    description: "Create and manage charges to collect payments from customers. Supports one-time payments, confirmations, refunds, partial approvals, and transaction status lookups."
  - name: Holds
    description: Place holds on funds to reserve an amount before capturing. Useful for authorization-then-capture payment flows.
  - name: Refunds
    description: Refund endpoints allow you to return funds to customers for completed charges, either partially or in full.
  - name: Payouts
    description: Payouts enable you to send funds to customer's cards, bank accounts or other payment methods.
  - name: AuthenticationSessions
    description: "Manage 3D Secure authentication sessions for enhanced payment security, including standalone sessions independent of payment flows."
  - name: Customers
    description: Manage customer records, including their payment methods and transaction history.
  - name: PaymentMethods
    description: "Store, retrieve, and manage payment methods including cards, bank accounts, and digital wallets. Includes token and network token management."
  - name: PaymentMethodDomains
    description: "Register and manage domains for Apple Pay and Google Pay web payments. Includes Apple Pay session creation for merchant validation."
  - name: Checkout
    description: Create hosted checkout experiences for seamless payment collection.
  - name: PaymentLinks
    description: Create shareable payment links that allow customers to complete payments without integration.
  - name: Subscriptions
    description: "Create and manage subscriptions and subscription packages for recurring payments. Set up billing terms, handle billing cycles, and manage subscriber lifecycle."
  - name: Disputes
    description: "Handle chargebacks and disputes, submit evidence, track dispute resolution status, and manage supporting documents."
  - name: Collaborations
    description: Manage and resolve all pre-dispute collaborations tools (CDRN, Ethoca, Mastercard Collaboration).
  - name: FraudWarnings
    description: Access fraud warnings and alerts associated with transactions to help identify potentially fraudulent activity.
  - name: Risk
    description: "Assess transaction risk before processing payments and manage risk reviews for flagged transactions."
  - name: ValueLists
    description: Value Lists allow you to create and manage custom lists of values for use in rules, filters, and other configurations.
  - name: Settlements
    description: "View settlement details, breakdowns, adjustments, and service fees showing how funds are allocated and transferred to your account."
  - name: Reconciliation
    description: Access transaction reconciliation data for accounting and financial reporting purposes.
  - name: ExchangeRates
    description: Get current exchange rates and calculate currency conversions for multi-currency transactions.
  - name: Merchants
    description: Retrieve merchant configuration and available payment method options.
paths:
  /attempts/payment:
    get:
      summary: Retrieve Attempts of a Session
      description: |-
        Retrieves the details of a Payment Session.

        Querying the API with the unique identifier of a Payment Session that was returned from a previous request will return the corresponding Payment Attempts.
      operationId: retrieve-attempts-of-a-payment-session
      tags:
        - PaymentSessions
      parameters:
        - $ref: '#/components/parameters/payment-session-id'
      responses:
        '200':
          $ref: '#/components/responses/payment-attempts-response'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad-request-error'
        '404':
          description: Payment session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not-found-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /attempts/payment/{id}:
    get:
      summary: Retrieve a Payment Attempt
      description: |-
        Retrieves the details of a Payment Attempt.

        Querying the API with the unique identifier of a Payment Attempt that was returned from a previous request will return the corresponding Payment Attempt information.
      operationId: retrieve-attempt-of-a-payment-session
      tags:
        - PaymentSessions
      parameters:
        - schema:
            type: string
            example: psatt_217940156986951680_0
            pattern: ^psatt_\d{18,20}_\d{1}
          name: id
          in: path
          required: true
          description: The id of the Payment Session to retrieve.
      responses:
        '200':
          $ref: '#/components/responses/payment-attempt-response'
        '404':
          description: Payment attempt not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not-found-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /attempts/setup:
    get:
      summary: Retrieve Attempts of a Session
      description: |-
        Retrieves the details of a Setup Session.

        Querying the API with the unique identifier of a Setup Session that was returned from a previous request will return the corresponding Setup Attempts.
      operationId: retrieve-attempts-of-a-setup-session
      tags:
        - SetupSessions
      parameters:
        - $ref: '#/components/parameters/setup-session-id'
      responses:
        '200':
          $ref: '#/components/responses/setup-attempts-response'
        '404':
          description: Setup session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not-found-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /attempts/setup/{id}:
    get:
      summary: Retrieve a Setup Attempt
      description: |-
        Retrieves the details of a Setup Attempt.

        Querying the API with the unique identifier of a Setup Attempt that was returned from a previous request will return the corresponding Setup Attempt information.
      operationId: retrieve-a-setup-attempt
      tags:
        - SetupSessions
      parameters:
        - schema:
            type: string
            example: ssatt_217940156986951680_0
            pattern: ^ssatt_\d{18,20}_\d{1}
          name: id
          in: path
          required: true
          description: The id of the Setup Attempt to retrieve.
      responses:
        '200':
          $ref: '#/components/responses/setup-attempt-response'
        '404':
          description: Setup attempt not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not-found-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /refunds:
    post:
      summary: Create a Refund
      description: Refund the funds from a Charge to the Payment Method.
      operationId: create-refund
      tags:
        - Refunds
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-refund-request'
            example:
              charge: chrg_296645958265997312
              amount_to_refund: '5000'
              reference: refund_order_12345
              metadata:
                reason_detail: Customer requested partial refund
      responses:
        '200':
          description: Returns the created refund object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/refund'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
    get:
      summary: List Refunds
      description: Retrieves the refunds in bulk.
      operationId: get-refunds-bulk
      tags:
        - Refunds
      parameters:
        - $ref: '#/components/parameters/created-greater-than-or-equals'
        - $ref: '#/components/parameters/created-greater-than'
        - $ref: '#/components/parameters/created-less-than-or-equals'
        - $ref: '#/components/parameters/created-less-than'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/customer-reference-id'
        - $ref: '#/components/parameters/ending-before'
        - $ref: '#/components/parameters/starting-after'
      responses:
        '200':
          description: Returns a list of refund objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-refunds-bulk-response'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /refunds/{id}:
    get:
      summary: Retrieve a Refund
      description: Retrieves the details of a Refund.
      operationId: get-refund-by-id
      tags:
        - Refunds
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            examples:
              - rfnd_146231656762572800
            pattern: ^rfnd_\d{18,20}
      responses:
        '200':
          description: Returns the refund object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/refund'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '404':
          description: Refund not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not-found-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /refunds/reference/{reference_id}:
    get:
      summary: Retrieve a Refund by Reference
      description: Retrieves the details of a Refund by reference.
      operationId: get-refund-by-reference
      tags:
        - Refunds
      parameters:
        - in: path
          name: reference_id
          required: true
          schema:
            type: string
            example: c7af52e8-c51f-4047-b636-4f1480bad573
          description: A unique string to reference the Refund.
      responses:
        '200':
          description: Returns the refund object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/refund'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /payouts:
    post:
      summary: Create a Payout
      description: Create a payout.
      operationId: create-payout
      tags:
        - Payouts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-payout-request'
            example:
              amount: 10000
              currency: usd
              destination: pm_card_296645958265997316
              reference: payout_order_12345
              statement_descriptor_suffix: ACME STORE
              metadata:
                order_id: '12345'
      responses:
        '200':
          description: Returns the created payout object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/payout'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
    get:
      summary: List Payouts
      description: Retrieves the payouts in bulk.
      operationId: get-payouts-bulk
      tags:
        - Payouts
      parameters:
        - $ref: '#/components/parameters/created-greater-than-or-equals'
        - $ref: '#/components/parameters/created-greater-than'
        - $ref: '#/components/parameters/created-less-than-or-equals'
        - $ref: '#/components/parameters/created-less-than'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/customer-reference-id'
        - $ref: '#/components/parameters/ending-before'
        - $ref: '#/components/parameters/starting-after'
      responses:
        '200':
          description: Returns a list of payout objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-payouts-bulk-response'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /payouts/{id}:
    get:
      summary: Retrieve a Payout
      description: Retrieves the details of a Payout.
      operationId: get-payout-by-id
      tags:
        - Payouts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            examples:
              - po_220442125165133824
            pattern: ^po_\d{18,20}
      responses:
        '200':
          description: Returns the payout object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/payout'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '404':
          description: Payout not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not-found-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /payouts/reference/{reference_id}:
    get:
      summary: Retrieve a Payout by Reference
      description: Retrieves the details of a Payout by reference.
      operationId: get-payout-by-reference
      tags:
        - Payouts
      parameters:
        - in: path
          name: reference_id
          required: true
          schema:
            type: string
            example: c7af52e8-c51f-4047-b636-4f1480bad573
          description: A unique string to reference the Payout.
      responses:
        '200':
          description: Returns the payout object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/payout'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /adjustments:
    get:
      summary: List Adjustments
      operationId: list-adjustments
      description: Retrieves a list of adjustments for a specific settlement.
      tags:
        - Settlements
      parameters:
        - name: settlement_id
          schema:
            type: string
            example: stlmnt_146231656762572800
            pattern: ^stlmnt_\d{18,20}
          in: query
          description: The id of the Settlement.
          required: true
        - name: page
          schema:
            type: integer
            example: 1
          in: query
          description: The number of items to skip before starting to collect the result set.
        - name: limit
          schema:
            type: integer
            example: 10
          in: query
          description: The numbers of items to return.
      responses:
        '200':
          description: Returns a list of adjustment objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/adjustments-list-response'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /adjustments/{adjustment_id}:
    get:
      summary: Retrieve an Adjustment
      description: Retrieves the details of an adjustment.
      operationId: get-adjustment-by-id
      tags:
        - Settlements
      parameters:
        - in: path
          name: adjustment_id
          required: true
          description: The id of the Adjustment.
          schema:
            type: string
            example: adj_146231656762572800
            pattern: ^adj_\d{18,20}
      responses:
        '200':
          description: Returns the adjustment object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/adjustment'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '404':
          description: Adjustment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not-found-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
  /transaction_status/{transaction_id_or_source_id}:
    get:
      summary: Get transaction status
      tags:
        - Charges
      responses:
        '200':
          description: Returns the transaction object.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/charge'
                  - $ref: '#/components/schemas/hold'
                  - $ref: '#/components/schemas/refund'
                  - $ref: '#/components/schemas/payout'
                  - $ref: '#/components/schemas/payment-method'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
      operationId: get-transaction-status
      description: Get transaction status by transaction or source id.
      parameters:
        - name: transaction_id_or_source_id
          schema:
            type: string
            example: chrg_146231656762572800
            pattern: (^(chrg|hld|rfnd|po))|(^pm_(card|paypal|in_bank_account|eu_bank_account|uk_bank_account|ecopayz|vyne|aircash|jeton))_\d{18,20}
          in: path
          required: true
          description: The identifier of the transaction.
  /value_lists/{list_id}:
    get:
      summary: Retrieve a Value List
      tags:
        - ValueLists
      responses:
        '200':
          description: Returns the value list object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/value-list'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
      operationId: get-value-list
      description: Retrieves the details of a value list.
      parameters:
        - name: list_id
          schema:
            type: string
            example: lst_146231656762572800
            pattern: ^lst_\d{18,20}
          in: path
          required: true
          description: The identifier of the value list.
    put:
      summary: Update a Value List
      tags:
        - ValueLists
      requestBody:
        $ref: '#/components/requestBodies/update-value-list'
      responses:
        '200':
          description: Returns the value list object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/value-list'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
      operationId: update-value-list
      description: Updates a value list.
      parameters:
        - name: list_id
          schema:
            type: string
            example: lst_146231656762572800
            pattern: ^lst_\d{18,20}
          in: path
          required: true
          description: The identifier of the value list.
    delete:
      summary: Delete a Value List
      tags:
        - ValueLists
      responses:
        '204':
          description: Deleted successfully.
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
      operationId: delete-value-list
      description: Deletes a value list.
      parameters:
        - name: list_id
          schema:
            type: string
            example: lst_146231656762572800
            pattern: ^lst_\d{18,20}
          in: path
          required: true
          description: The identifier of the value list.
  /value_lists/{list_id}/items/{item_id}:
    get:
      summary: Retrieve a Value List Item
      tags:
        - ValueLists
      responses:
        '200':
          description: Returns the value list item object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/value-list-item'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
      operationId: get-value-list-item
      description: Retrieves the details of a value list item.
      parameters:
        - name: list_id
          schema:
            type: string
            example: lst_146231656762572800
            pattern: ^lst_\d{18,20}
          in: path
          required: true
          description: The identifier of the value list.
        - name: item_id
          schema:
            type: string
            example: lsti_146231656762572800
            pattern: ^lsti_\d{18,20}
          in: path
          required: true
          description: The identifier of the value-list item.
    delete:
      summary: Delete a Value List Item
      tags:
        - ValueLists
      responses:
        '204':
          description: Deleted successfully.
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
      operationId: delete-value-list-item
      description: Deletes a value list item.
      parameters:
        - name: list_id
          schema:
            type: string
            example: lst_146231656762572800
            pattern: ^lst_\d{18,20}
          in: path
          required: true
          description: The id of the value list.
        - name: item_id
          schema:
            type: string
            example: lsti_146231656762572800
            pattern: ^lsti_\d{18,20}
          in: path
          required: true
          description: The identifier of the value-list item.
    post:
      summary: Update a Value List Item
      tags:
        - ValueLists
      requestBody:
        $ref: '#/components/requestBodies/update-value-list-item'
      responses:
        '200':
          description: Returns the value list item object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/value-list-item'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validation-error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal-server-error'
      operationId: update-value-list-item
      description: Updates a value list item.
      parameters:
        - name: list_id
          schema:
            type: string
            example: lst_146231656762572800
            pattern: ^lst_\d{18,20}
          in: path
          required: true
          description: The identifier of the value list.
        - name: item_id
          schema:
            type: string
            example: lsti_146231656762572800
            pattern: ^lsti_\d{18,20}
          in: path
          required: true
          description: The identifier of the value-list item.
  /value_lists:
    post:
      summary: Create a Value List
      tags:
        - ValueLists
      requestBody:
        $ref: '#/components/requestBodies/create-value-list'
      responses:
        '201':
          description: Returns the created value list object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/value-list'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
