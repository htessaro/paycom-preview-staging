                  example: true
    payment-method-options:
      type: object
      description: Payment method specific configurations.
      properties:
        card:
          $ref: '#/components/schemas/card-payment-method-options'
        us_bank_account:
          $ref: '#/components/schemas/us-bank-account-payment-method-options'
        paypal:
          $ref: '#/components/schemas/paypal-payment-method-options'
        applepay:
          $ref: '#/components/schemas/applepay-payment-method-options'
        googlepay:
          $ref: '#/components/schemas/googlepay-payment-method-options'
        bank_account:
          type: object
          description: Options for bank account payments.
          properties:
            allowed_countries:
              type: array
              description: List of countries to accept for this payment.
              items:
                type: string
        skrill:
          $ref: '#/components/schemas/skrill-neteller-payment-method-options'
        neteller:
          $ref: '#/components/schemas/skrill-neteller-payment-method-options'
        authentication_options:
          type: object
          description: Authentication options for the payment method as provided in the request.
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - three_ds
                - three_ri
                - bep
              description: Type of authentication.
            three_ds:
              type: object
              description: Only present if type = three_ds.
              properties:
                accepted_eci_values:
                  type: array
                  description: List of accepted ECI values.
                  items:
                    type: string
                    enum:
                      - '00'
                      - '01'
                      - '02'
                      - '05'
                      - '06'
                      - '07'
                flow_indicator:
                  type: object
                  description: Flow indicator for 3DS authentication.
                  properties:
                    type:
                      type: string
                      enum:
                        - challenge
                        - frictionless
                        - data_share
                      description: Type of 3DS flow.
                    challenge:
                      type: object
                      description: Only present if type = challenge.
                      properties:
                        type:
                          type: string
                          description: Type of challenge.
                        allow_frictionless:
                          type: boolean
                          description: Whether to allow frictionless flow as fallback.
                    frictionless:
                      type: object
                      description: Only present if type = frictionless.
                      properties:
                        sca_exemption_type:
                          type: string
                          enum:
                            - low_value
                            - transaction_risk_analysis
                            - secure_corporate_process
                          description: Type of SCA exemption.
            three_ri:
              type: object
              description: Only present if type = three_ri.
              properties:
                indicator:
                  type: string
                  enum:
                    - recurring
                    - ucof
                  description: 3RI indicator.
                require_issuer_liability_shift:
                  type: boolean
                  description: Whether to require issuer liability shift.
      example:
        card:
          security_checks:
            address_line1_check: true
            address_postal_code_check: true
            cvv_check: true
    shipping-details:
      type: object
      description: Shipping information for the payment.
      properties:
        address:
          $ref: '#/components/schemas/address'
        name:
          type: string
          description: Full name of the recipient.
          example: John Smith
        phone:
          type: string
          description: Phone number of the recipient in E.164 format.
          pattern: ^\+\d+
          example: '+14155551234'
    risk-assessment-details:
      type: object
      description: Details about the risk assessment performed on the transaction.
      properties:
        outcome:
          type: string
          description: The risk assessment outcome. One of `three_ds_exemption`, `three_ds_not_required`, `allow`, `require_three_ds`, `three_ds_challenge`, or `block`.
          enum:
            - three_ds_exemption
            - three_ds_not_required
            - allow
            - require_three_ds
            - three_ds_challenge
            - block
          example: allow
        outcome_source:
          type: string
          description: The source of the risk assessment outcome. One of `score`, `rule`, or `rules`.
          enum:
            - score
            - rule
            - rules
          example: score
        rule_id:
          type: string
          description: The rule ID that triggered the outcome (when outcome_source is 'rule').
          example: rule_123
        rules_id:
          type: array
          description: List of rule IDs that triggered the outcome (when outcome_source is 'rules').
          items:
            type: string
        score:
          type: string
          description: The risk assessment score (when outcome_source is 'score').
          example: '31'
        flags:
          type: array
          description: List of risk flags associated with the transaction.
          items:
            type: string
          example:
            - no_correlation_history
            - multiple_identities_billing
            - multiple_identities_card
            - free_email_provider
            - risky_billing_time
            - velocity_multiple_addresses
            - velocity_multiple_names
        bypassed:
          type: array
          description: List of rule IDs that were bypassed.
          items:
            type: string
