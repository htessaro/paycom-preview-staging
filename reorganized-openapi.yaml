components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-paycom-api-key
  schemas:
    card-brand:
      type: string
      description: The brand of the card.
      enum:
        - visa
        - mastercard
        - amex
        - discover
        - unionpay
        - jcb
    card-funding:
      type: string
      description: Card funding type.
      enum:
        - debit
        - credit
        - prepaid
        - unknown
    card-category:
      type: string
      description: Card category.
      enum:
        - consumer
        - business
    security-checks-result:
      type: object
      description: Results of security checks performed on the card.
      properties:
        address_line1_check:
          type: string
          description: Result of the AVS check for address line 1.
          example: unavailable
          enum:
            - pass
            - fail
            - unavailable
            - unchecked
        address_postal_code_check:
          type: string
          description: Result of the AVS check for postal code.
          example: unavailable
          enum:
            - pass
            - fail
            - unavailable
            - unchecked
        cvc_check:
          type: string
          description: Result of the CVC check.
          example: pass
          enum:
            - pass
            - fail
            - unavailable
            - unchecked
    three-ds-details:
      type: object
      description: Populated if this payment used 3D Secure authentication (new fields format).
      properties:
        authentication_flow:
          type: string
          description: 'For authenticated transactions: how the customer was authenticated by the issuing bank.'
          example: challenge
        result:
          type: string
          description: Indicates the outcome of 3D Secure authentication.
          example: authenticated
        result_reason:
          type: string
          description: Additional information about why 3D Secure succeeded or failed based on the result.
          example: Challenge completed successfully.
        status_reason:
          type: string
          description: Status reason code from the 3D Secure authentication.
        protocol_version:
          type: string
          description: The version of 3D Secure that was used.
          example: 2.2.0
        eci:
          type: string
          description: ECI Indicator from the 3D Secure authentication.
          example: '02'
        cryptogram:
          type: string
          description: Cryptogram from the 3D Secure authentication.
        liability_shift:
          type: boolean
          description: Whether the liability shift was applied.
          example: true
        cardholder_info:
          type: string
          description: Text provided by the ACS/issuer to the cardholder during authentication.
        acs_transaction_id:
          type: string
          description: ACS Transaction ID from the 3D Secure authentication.
          example: f43f659d-f5b3-48ca-b375-cda2f7c51b8c
        three_ds_server_transaction_id:
          type: string
          description: 3DS Server Transaction ID from the 3D Secure authentication.
          example: 9274c344-2fdf-4be8-a1d8-941e0944d0f2
        ds_transaction_id:
          type: string
          description: DS Transaction ID from the 3D Secure authentication.
          example: a1b10a96-d03b-416e-b80a-d16894e7c9c5
        ares:
          type: string
          description: Authentication Response (ARes) from the 3D Secure authentication.
          example: '{"messageVersion":"2.2.0","messageType":"ARes","acsTransID":"e87e38d4-bdea-4490-a67f-c71438379b3d","acsReferenceNumber":"3DS_LOA_ACS_MOMD_020200_00332","acsURL":"https://acs2.swedbank.se/mdpayacs/creq","authenticationType":"03","acsChallengeMandated":"N","dsReferenceNumber":"3DS_LOA_DIS_MAST_020301_00931","dsTransID":"b27790e7-e79e-478c-989a-ca808ebea1d0","threeDSServerTransID":"16e015d2-3413-4fe5-8b1e-29de15e1300e","transStatus":"C","acsOperatorID":"ACS-V210-MODIRUM_OÜ-42496"}'
        rreq:
          type: string
          description: Requestor Response (RReq) from the 3D Secure authentication.
          example: '{"messageVersion":"2.2.0","messageType":"RReq","acsTransID":"e87e38d4-bdea-4490-a67f-c71438379b3d","authenticationType":"03","authenticationValue":"kBMHHbJSZISD+A/IX6Ic4ZeBcdmC","dsTransID":"b27790e7-e79e-478c-989a-ca808ebea1d0","threeDSServerTransID":"16e015d2-3413-4fe5-8b1e-29de15e1300e","transStatus":"Y","interactionCounter":"00","eci":"02","messageCategory":"01"}'
    partial-approval:
      type: object
      description: Details about partial approval if the transaction was partially approved.
      properties:
        status:
          type: string
          description: Status of the partial approval.
          example: approved
        amount_requested:
          type: integer
          description: Amount requested in the smallest currency unit.
          example: 10000
        amount_authorized:
          type: integer
          description: Amount authorized in the smallest currency unit.
          example: 7500
        amount_charged:
          type: integer
          description: Amount charged in the smallest currency unit.
          example: 7500
        product_id:
          type: string
          description: Product ID associated with the partial approval.
          example: prod_12345
    card-payment-method-details:
      type: object
      description: Details about the card used for the payment.
      properties:
        bin:
          type: string
          description: The first six digits of the card number.
          examples:
            - '424242'
        brand:
          $ref: '#/components/schemas/card-brand'
          description: The brand of the card.
          examples:
            - visa
        cardholder_currency:
          type: string
          description: Three-letter ISO currency code of the cardholder's card, in lowercase.
          example: usd
        country:
          type: string
          description: Two-letter ISO code representing the country of the card issuer.
          examples:
            - US
        exp_month:
          type: string
          description: Two-digit string representing the card's expiration month.
          examples:
            - '12'
        exp_year:
          type: string
          description: Four-digit string representing the card's expiration year.
          examples:
            - '2028'
        fingerprint:
          type: string
          description: Unique identifier for this card number, useful for detecting duplicate cards across customers.
          examples:
            - fp_abc123xyz789
        funding:
          $ref: '#/components/schemas/card-funding'
          description: The funding type of the card.
        last4:
          type: string
          description: The last four digits of the card number.
          examples:
            - '4242'
        network:
          type: string
          description: Identifies which network this payment was processed on.
          examples:
            - visa
        category:
          $ref: '#/components/schemas/card-category'
          description: Card category.
        security_checks:
          $ref: '#/components/schemas/security-checks-result'
