            type: object
            properties:
              start:
                type: number
                minimum: 0
                maximum: 100
              end:
                type: number
                minimum: 0
                maximum: 100
              outcome:
                type: string
                enum:
                  - three_ds_exemption
                  - three_ds_not_required
                  - allow
                  - require_three_ds
                  - three_ds_challenge
                  - block
    assessments-response:
      type: object
      description: Risk Assessment Response object.
      properties:
        id:
          type: string
          description: Unique identifier for Risk Assessment object.
          example: rsk_146231656762572800
        resource:
          type: string
          description: String representing the resource type.
          example: risk_assessment
          default: risk_assessment
        amount:
          type: number
          format: double
          description: Amount assessed, in minor units.
          example: 252
        amount_human_readable:
          type: string
          description: Amount in human readable format.
          example: '2.52'
        currency:
          type: string
          description: Three-letter ISO currency code, in lowercase.
          example: usd
        billing_details:
          $ref: '#/components/schemas/billing-details'
          description: Billing information associated with the assessment.
        shipping:
          $ref: '#/components/schemas/shipping-details'
          description: Shipping information associated with the assessment.
        payment_method_details:
          $ref: '#/components/schemas/payment-method-details'
          description: Details about the payment method being assessed.
        created:
          type: string
          description: The date and time at which the resource was created. ISO String format.
        test_mode:
          type: boolean
          description: Indicates if assessment is from sandbox/test environment.
        options:
          $ref: '#/components/schemas/risk-assessment-options'
          description: Options used for this risk assessment.
        outcome_source:
          type: string
          enum:
            - score
            - rule
          description: Source of the risk assessment outcome.
        rule_id:
          type: string
          description: ID of the rule that triggered the outcome, if applicable.
        score:
          type: number
          description: Risk score assigned to this assessment, if available.
        outcome:
          type: string
          enum:
            - three_ds_exemption
            - three_ds_not_required
            - allow
            - block
            - require_three_ds
            - three_ds_challenge
          description: Final outcome of the risk assessment.
        flags:
          type: array
          description: List of risk flags identified during assessment.
          items:
            type: string
    token:
      type: object
      description: Token object.
      properties:
        id:
          type: string
          description: Unique identifier for Token object.
          example: tok_card_296645958265997326
        type:
          type: string
          description: Token type.
          example: card
        resource:
          type: string
          description: String representing the resource type.
          example: token
        card:
          $ref: '#/components/schemas/card-payment-method-details'
          description: Card payment method details.
    payment-method-domains:
      description: Merchant's payment method domains.
      type: object
      properties:
        resource:
          type: string
          description: String representing the resource type.
          example: payment_method_domains
          default: payment_method_domains
        domain_names:
          type: array
          description: List of accepted payment method domains.
          example:
            - exmaple1.com
            - exmaple2.com
          default:
            - exmaple1.com
          items:
            type: string
    create-session-independent:
      description: Authentication session independent.
      required:
        - id
        - resource
        - amount
        - amount_human_readable
        - capture
        - currency
        - status
      type: object
      properties:
        payment:
          type: boolean
          description: Identifies authentication session flow, whether it is setup or payment.
          example: true
        amount:
          type: integer
          minimum: 1
          description: Required if `payment` is true.
          example: 3875
        currency:
          type: string
          maxLength: 3
          description: Required if `payment` is true (ISO 4217 code).
          example: gbp
        payment_method:
          type: string
          description: Identifier matching SOURCE_OR_TOKEN_ID_REGEX.
          example: src_12345abcde
        reference:
          type: string
          maxLength: 255
          example: 197840376-1755245827-245-2901
        settlement_account:
          type: string
          example: acct_live_abc123
        return_url:
          type: string
          format: uri
          example: https://checkout.payment.place/return/184223292-1755245826-2901?is3d=true
        shipping:
          $ref: '#/components/schemas/shipping-details'
        metadata:
          type: object
          additionalProperties: true
          example: {}
        payment_method_data:
          type: object
          description: Payment method payload (union of supported types).
          required:
            - type
          properties:
            billing_details:
              $ref: '#/components/schemas/billing-details'
            type:
              $ref: '#/components/schemas/source-type'
            underlying_network_id:
              type: string
            setup_future_usage:
              type: string
              description: Setup future usage options.
              example: off_session
            card:
              $ref: '#/components/schemas/card-details-source'
              description: Raw details of a card payment method.
            source:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: A payment method to be used as the source for the Charge.
                authentication_context:
                  $ref: '#/components/schemas/authentication-context'
            token:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: A token that identifies the payment method in Pay.com's Tokenization Vault.
                cvv:
                  type: string
                  description: Card security code.
                  example: '123'
                authentication_context:
                  $ref: '#/components/schemas/authentication-context'
            googlepay:
              $ref: '#/components/schemas/googlepay-source'
              description: The payload that was retrieved from the Google Pay response.
            applepay:
              $ref: '#/components/schemas/applepay-source'
              description: The payload that was retrieved from the Apple Pay response.
            network_token:
              $ref: '#/components/schemas/network-token-source'
        authentication_options:
          type: object
          description: Options controlling authentication.
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - three_ds
                - three_ri
                - bep
            return_url:
              type: string
              format: uri
            future_usage:
              type: object
              description: Declares intended future usage.
              properties:
                type:
                  type: string
                  enum:
                    - installment
                    - recurring
                    - card_on_file
                installment:
                  type: object
                  required:
                    - interval
                    - interval_count
                    - expiry
                  properties:
                    number:
                      type: integer
                    amount:
                      type: integer
                    interval:
                      type: string
                      enum:
                        - day
                        - month
                        - year
                    interval_count:
                      type: integer
                      minimum: 1
                    expiry:
                      type: object
                      required:
                        - type
                      properties:
                        type:
                          type: string
                recurring:
                  type: object
                  required:
                    - interval
                    - interval_count
                    - expiry
                  properties:
                    amount:
                      type: integer
                    interval:
                      type: string
                      enum:
                        - day
                        - month
                        - year
                    interval_count:
                      type: integer
                      minimum: 1
                    expiry:
                      type: object
                      required:
                        - type
                      properties:
                        type:
                          type: string
            three_ds:
              type: object
              description: Only present if type = three_ds.
              properties:
                channel:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - browser
                    browser:
                      $ref: '#/components/schemas/authentication-context'
                flow_indicator:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - challenge
                        - frictionless
                        - data_share
                    challenge:
                      type: object
                      properties:
                        type:
                          type: string
                        allow_frictionless:
                          type: boolean
                    frictionless:
                      type: object
                      properties:
                        sca_exemption_type:
                          type: string
                          enum:
                            - low_value
                            - transaction_risk_analysis
                            - secure_corporate_process
                submit:
                  type: string
                  enum:
                    - if_fingerprinting_not_supported
                    - never
                    - always
                  default: never
            three_ri:
              type: object
              description: Only present if type = three_ri.
              required:
                - indicator
                - initial_authentication_info
              properties:
                indicator:
                  type: string
                initial_authentication_info:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum:
                        - data
                        - transaction
                    transaction:
                      type: object
                      properties:
                        id:
                          type: string
                    data:
                      type: object
                      properties:
                        authentication_flow:
                          type: string
                        date_time:
                          type: string
                        acs_transaction_id:
                          type: string
                        ds_transaction_id:
                          type: string
    three-ds-options:
      type: object
      description: Options for 3-D Secure (2.x) authentication.
      properties:
        flow_indicator:
          type: object
          description: Indicates supported/desired 3DS flows.
          properties:
            type:
              type: string
              description: The supported 3DS flow type.
              enum:
                - challenge
                - frictionless
                - data_share
              example: frictionless
            challenge:
              type: object
              description: Parameters specific to challenge flow.
              properties:
                type:
                  type: string
                  description: Challenge type or mandate indicator.
                  example: mandated
            frictionless:
              type: object
              description: Parameters specific to frictionless flow.
              properties:
                sca_exemption_type:
                  description: Array parsed from a slash-delimited list of SCA exemption types.
                  type: string
                  enum:
                    - low_value
                    - transaction_risk_analysis
                    - secure_corporate_process
                  example: low_value
    three-ri-options:
      type: object
      description: Options for 3DS Requestor Initiated (3RI) authentication.
      properties:
        indicator:
          type: string
          description: 3RI indicator or reason; empty if not specified.
          example: ''
        initial_authentication_info:
          type: object
          description: Information about the initial cardholder authentication event.
          properties:
            type:
              type: string
              description: The type of initial authentication info.
              enum:
                - data
                - transaction
              example: data
            transaction:
              type: object
              description: Related transaction reference.
              properties:
                id:
                  type: string
                  description: Transaction identifier of the initial charge.
                  example: chrg_123
            data:
              type: object
              description: Additional data for the initial authentication event.
              properties:
                authentication_flow:
                  type: string
                  description: How the initial authentication was performed.
                  example: challenge
                date_time:
                  type: string
                  description: Timestamp of the initial authentication (ISO 8601).
                  example: '1757337676892'
                acs_transaction_id:
                  type: string
                  description: ACS transaction ID of the initial auth.
                  example: 12231-123213-123123
                ds_transaction_id:
                  type: string
                  description: DS transaction ID of the initial auth.
                  example: 131231-31231-1231
    authentication-options:
      type: object
      description: Options to influence or describe the desired authentication behavior.
      properties:
        three_ds:
          $ref: '#/components/schemas/three-ds-options'
        three_ri:
          $ref: '#/components/schemas/three-ri-options'
      example:
        three_ds:
          flow_indicator:
            type: frictionless
            frictionless:
              sca_exemption_type: low_value
    authentication-details:
      type: object
      description: 3-D Secure 2.x result payload.
      properties:
        acs_transaction_id:
          type: string
          description: Directory Server-assigned ACS transaction ID.
          example: f43f659d-f5b3-48ca-b375-cda2f7c51b8c
        three_ds_server_transaction_id:
          type: string
          description: Transaction ID assigned by the 3DS Server.
          example: 9274c344-2fdf-4be8-a1d8-941e0944d0f2
        ds_transaction_id:
          type: string
          description: Directory Server transaction ID.
          example: a1b10a96-d03b-416e-b80a-d16894e7c9c5
        cardholder_info:
          type: string
          description: Cardholder info returned by ACS, if any.
        cryptogram:
          type: string
          description: CAVV/cryptogram returned by ACS (if provided).
        eci:
          type: array
          description: Electronic Commerce Indicator (e.g., "05", "06").
          items:
            type: string
        authentication_flow:
          type: string
          description: Flow performed (e.g., challenge or frictionless).
          example: challenge
        status_reason:
          type: string
          description: Reason code or text when authentication failed or was not completed.
          example: failed
        protocol_version:
          type: string
          description: 3DS protocol version used.
          example: 2.2.0
        ares:
          type: string
          description: Raw ARes (JSON string) returned by ACS.
          example: '{}'
    session-independent:
      type: object
      description: Independent authentication (SCA) session resource.
      required:
        - id
        - resource
        - type
        - amount
        - currency
        - created
        - test_mode
        - status
      properties:
        id:
          type: string
          description: Unique identifier for the SCA session.
          example: sca_611473455610617856
        resource:
          type: string
          description: Resource type identifier.
          enum:
            - independent_authentication_session
          example: independent_authentication_session
        type:
          type: string
          description: Session type indicating whether this is a setup or payment authentication.
          enum:
            - setup
            - payment
          example: setup
        amount:
          type: integer
          description: Amount in minor units (e.g., pence for GBP).
          example: 3875
        amount_human_readable:
          type: string
          description: Amount formatted in major units as a string.
          example: '38.75'
        billing_details:
          $ref: '#/components/schemas/billing-details'
        created:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the session was created (UTC).
          example: '2025-08-15T08:17:12.451Z'
        currency:
          type: string
          description: ISO 4217 currency code (lowercase).
          example: gbp
          pattern: ^[a-z]{3}$
        metadata:
          type: object
          description: Free-form key/value metadata.
          additionalProperties: true
          example: {}
        payment_method:
          type: string
          description: Identifier of the selected payment method.
          example: pm_card_609346352002878144
        payment_method_details:
          $ref: '#/components/schemas/payment-method-details'
        reference:
          type: string
          description: Merchant reference or correlation identifier.
          example: 197840376-1755245827-245-2901
        shipping:
          $ref: '#/components/schemas/shipping-details'
        test_mode:
          type: boolean
          description: Indicates whether the session was created in test/sandbox mode.
          example: false
        return_url:
          type: string
          format: uri
          description: URL to return the shopper to after authentication.
          example: https://checkout.payment.place/return/184223292-1755245826-2901?is3d=true
        authentication_options:
          $ref: '#/components/schemas/authentication-options'
        authentication_type:
          type: string
          description: Authentication mechanisms.
          enum:
            - three_ds
            - three_ri
            - bep
          example: three_ds
        authentication_details:
          $ref: '#/components/schemas/authentication-details'
        fingerprint_url:
          type: string
          format: uri
          description: URL for device fingerprinting for risk/3DS.
          example: https://sca.p.com/finterprint?client_secret=eyJhbGciOiJIUzUxMiJ9
        url:
          type: string
          format: uri
          description: URL to start or continue the authentication flow.
          example: https://sca.a.com/authenticate?client_secret=eyJhbGciOiJIUzUxMiJ9
        status:
          type: string
          description: Current session status.
          enum:
            - requires_submission
            - requires_authentication
            - error
            - failed
            - succeeded
          example: requires_authentication
        result:
          type: string
          description: Final outcome once the session is completed.
          enum:
            - abandoned
            - attempt_acknowledged
            - authenticated
            - denied
            - not_supported
            - processing_error
            - rejected
          example: authenticated
    create-document-request:
      type: object
      description: Request body for creating a new document.
      required:
        - filename
        - reference
        - content_type
      properties:
        filename:
          type: string
          maxLength: 255
          description: The original filename of the document.
          example: receipt.pdf
        reference:
          type: string
          maxLength: 255
          description: A reference identifier to associate with the document.
          example: order_12345
        content_type:
          type: string
          maxLength: 255
          description: The MIME type of the document.
          example: application/pdf
        content_length:
          type: integer
          description: The size of the document in bytes.
          example: 102400
        title:
          type: string
          maxLength: 255
          description: An optional display title for the document.
          example: Order Receipt
    document:
      type: object
      description: A Document object represents an uploaded file that can be used as evidence for disputes.
      properties:
        id:
          type: string
          description: Unique identifier for the Document.
          example: doc_296645958265997312
        resource:
          type: string
          enum:
            - document
          description: The resource type.
          example: document
        created:
          type: string
          format: date-time
          description: Time at which the document was created.
          example: '2024-01-15T10:30:00Z'
        filename:
          type: string
          description: The original filename of the uploaded document.
          example: receipt.pdf
        reference:
          type: string
          description: A reference identifier for the document.
          example: order_12345
        status:
          type: string
          enum:
            - created
            - uploaded
          description: The current status of the document.
          example: uploaded
        content_type:
          type: string
          description: The MIME type of the document.
          example: application/pdf
        content_length:
          type: integer
          description: The size of the document in bytes.
          example: 102400
        category:
          type: string
          enum:
            - dispute_evidence
          description: The category of the document.
          example: dispute_evidence
        url:
          type: string
          description: The URL path to retrieve the document contents.
          example: /documents/doc_296645958265997312/contents
        title:
          type: string
          description: An optional display title for the document.
          example: Order Receipt
      required:
        - id
        - resource
        - created
        - filename
        - reference
        - status
        - content_type
        - category
    risk-review:
      type: object
      description: A Risk Review represents a flagged transaction or customer that requires manual review.
      properties:
        id:
          type: string
          description: Unique identifier for the Risk Review.
          example: rv_296645958265997312
        resource:
          type: string
          enum:
            - risk_review
          description: The resource type.
          example: risk_review
        type:
          type: string
          enum:
            - transaction
            - customer
          description: The type of entity being reviewed.
          example: transaction
        status:
          type: string
          enum:
            - pending_review
            - approved
            - declined
          description: The current status of the review.
          example: pending_review
        created:
          type: string
          format: date-time
          description: Time at which the review was created.
          example: '2024-01-15T10:30:00Z'
        merchant_id:
          type: string
          description: The ID of the merchant associated with this review.
          example: mrch_296645958265997312
        transaction_id:
          type: string
          description: The ID of the transaction being reviewed (if applicable).
          example: chrg_296645958265997312
        reason:
          type: string
          description: The reason the review was triggered.
          example: High risk score detected
        metadata:
          type: object
          description: Additional metadata about the review.
          additionalProperties: true
      required:
        - id
        - resource
        - type
        - status
        - created
    card-jurisdiction:
      type: string
      description: Card jurisdiction.
      enum:
        - domestic
        - international
        - intraregional
    eci-value:
      type: string
      description: ECI Indicator value.
      enum:
        - '00'
        - '01'
        - '02'
        - '05'
        - '06'
        - '07'
    after-completion:
      type: object
      description: After completion data object.
      properties:
        type:
          type: string
          description: Type of the data.
          enum:
            - redirect
            - hosted_confirmation
        hosted_confirmation:
          type: object
          description: Hosted confirmation related data.
          properties:
            custom_message:
              type: string
              maxLength: 255
              description: A custom message to show a customer.
        redirect:
          type: object
          description: Redirect related data.
          properties:
            url:
              type: string
              maxLength: 255
              format: uri
              description: A redirect URL.
      required:
        - type
    transaction-reconciliation:
      type: object
      description: Reconciliation object.
      properties:
        id:
          type: string
          description: Unique identifier of the related Transaction.
          example: chrg_46231656762572800
          pattern: ^(chrg|hld|psatt|rfnd|po|chb|rprstmnt)_\d{18,20}
        resource:
          type: string
          description: String representing the object's type.
          example: charge
          enum:
            - attempt
            - charge
            - hold
            - refund
            - payout
            - chargeback
            - representment
        merchant:
          type: string
          description: Unique identifier of the Merchant.
          example: mrchnt_382018687257234944
        merchant_reference:
          type: string
          description: Your unique identifier for the merchant.
          example: b311227f-8561-41db-bf46-1fc14c18e31f
        payment_session:
          type: string
          description: Unique identifier of the Payment Session, if the transaction was created through hosted checkout.
          example: ps_382018687257234944
        created:
          type: string
          description: Time at which the object was created, in ISO 8601 format.
          example: '2024-08-20T13:56:14.011Z'
        reference:
          type: string
          description: A unique string to reference the transaction, useful for reconciliation with your internal systems.
          example: b311227f-8561-41db-bf46-1fc14c18e31f
        status:
          type: string
          description: Status of the transaction.
          example: succeeded
          enum:
            - succeeded
            - failed
        failure_code:
          type: string
          description: Error code explaining the reason for failure, if applicable.
          example: expired_card
        currency:
          type: string
          description: Three-letter ISO currency code, in lowercase.
          example: eur
        amount:
          type: string
          description: Transaction amount in human-readable format.
          example: '120.00'
        settlement_currency:
          type: string
          description: Three-letter ISO currency code of the settlement, in lowercase.
          example: eur
        settlement_amount:
          type: string
          description: Settlement amount in human-readable format.
          example: '120.00'
        exchange_rate:
          type: string
          description: Exchange rate applied between transaction and settlement currencies.
          example: '0.2'
        net_amount:
          type: string
          description: Net amount after fees in human-readable format.
        fee_interchange:
          type: string
          description: Interchange fee amount in human-readable format.
          example: '0.12'
        fee_network:
          type: string
          description: Network fee amount in human-readable format.
          example: '0.12'
        fee_processing:
          type: string
          description: Processing fee amount in human-readable format.
          example: '0.12'
        metadata:
          type: object
          description: Set of key-value pairs attached to the object.
        jurisdiction:
          type: string
          $ref: '#/components/schemas/card-jurisdiction'
          example: domestic
        payment_method_type:
          type: string
          description: The type of payment method used.
          example: card
