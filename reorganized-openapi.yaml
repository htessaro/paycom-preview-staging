    three-ds:
      type: object
      description: Required information to process a payment that has been 3DS authenticated using a Third Party provider.
      required:
        - eci
        - cavv
      properties:
        eci:
          type: string
          description: The Electronic Commerce Indicator security level associated with the 3D Secure enrollment result.
          example: '07'
        cavv:
          type: string
          description: A Base64 encoded cryptographic identifier (CAVV) used by the card schemes to validate the cardholder authentication result (3D Secure).
          example: AAEBAwQjSQAAXXXXXXXJYe0BbQA=
        ds_trans_id:
          type: string
          description: |-
            The 3D Secure transaction identifier. 

            Required for 3D Secure 2.X.X and a Mastercard card.
        xid:
          type: string
          description: |-
            Transaction identifier resulting from authentication processing.

            Required for 3DS version 1.0.0.
        version:
          type: string
          description: |-
            Indicates the version of 3D Secure that was used for authentication. 

            Defaults to 1.0.0 if not provided
          example: 2.2.0
    three-ri-source:
      type: object
      description: 3DS Requestor Initiated (3RI) authentication data.
      required:
        - acs_transaction_id
        - ds_transaction_id
        - authentication_flow
        - date_time
      properties:
        acs_transaction_id:
          type: string
          description: ACS transaction ID of the initial authentication.
          example: abc123-def456-ghi789
        ds_transaction_id:
          type: string
          description: DS transaction ID of the initial authentication.
          example: ds_abc123456789
        authentication_flow:
          type: string
          description: How the initial authentication was performed.
          enum:
            - frictionless
            - challenge
          example: challenge
        date_time:
          type: string
          description: Time at which the initial authentication occurred.
          example: '2024-01-15T10:30:00Z'
    authentication-context:
      type: object
      properties:
        customer_ip_address:
          type: string
          description: Customer IP address.
        browser_details:
          type: object
          description: Customer browser details.
          properties:
            accept_header:
              type: string
              example: '*/*'
              description: Exact content of the HTTP accept headers.
            javascript_enabled:
              type: boolean
              description: Whether Javascript is enabled in browser.
            language:
              type: string
              example: en-GB
              description: Browser language. Returned from `navigator.language` property from the HTML DOM API.
            user_agent:
              type: string
              example: Mozilla/5.0 (Linux; Android 11; SM-A528B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.0.0 Mobile Safari/537.36
              description: Exact content of the HTTP user-agent header.
            screen_width:
              type: integer
              format: int32
              example: 428
              description: Screen width of a device. Obtained from cardholder browser using the `screen.width` property.
            screen_height:
              type: integer
              format: int32
              example: 926
              description: Screen height of a device. Obtained from cardholder browser using the `screen.height` property.
            timezone_offset:
              type: string
              example: '0'
              description: Offset from UTC timezone in minutes. Obtained from cardholder browser using the `getTimezoneOffset()` method.
            java_enabled:
              type: boolean
              description: Whether Java is enabled in browser. Obtained from cardholder browser using the `navigator.javaEnabled` property.
            color_depth:
              type: integer
              format: int32
              example: 32
              description: Color depth of a device screen. Obtained from cardholder browser using the `screen.colorDepth` property.
          required:
            - accept_header
            - javascript_enabled
            - language
            - user_agent
            - screen_width
            - screen_height
            - timezone_offset
            - java_enabled
            - color_depth
