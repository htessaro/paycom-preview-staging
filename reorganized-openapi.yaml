  /payment_methods/import:
    post:
      summary: Import a Payment Method
      description: Imports a payment method using a vault token. This allows importing payment methods from external sources.
      operationId: import-payment-method
      tags:
        - PaymentMethods
      parameters:
        - $ref: '#/components/parameters/idempotency-key'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - card
              properties:
                type:
                  type: string
                  enum:
                    - card
                  description: The type of payment method to import.
                  example: card
                card:
                  type: object
                  required:
                    - type
                    - token
                  properties:
                    type:
                      type: string
                      enum:
                        - token
                      description: The type of card data being provided.
                      example: token
                    token:
                      type: string
                      description: The vault token representing the card data.
                      example: vault_token_abc123
                    name:
                      type: string
                      description: The cardholder name.
                      example: John Doe
                    billing_address:
                      type: object
                      description: The billing address associated with the card.
                      properties:
                        first_name:
                          type: string
                          example: John
                        last_name:
                          type: string
                          example: Doe
                        line1:
                          type: string
                          example: 123 Main St
                        line2:
                          type: string
                          example: Apt 4
                        city:
                          type: string
                          example: San Francisco
                        state:
                          type: string
                          example: CA
                        postal_code:
                          type: string
                          example: '94105'
                        country:
                          type: string
                          example: US
                customer_reference_id:
                  type: string
                  maxLength: 255
                  description: An optional reference ID to associate this payment method with a customer.
                  example: customer_12345
                metadata:
                  type: object
                  additionalProperties: true
                  description: Additional metadata to attach to the payment method.
                  example:
                    order_id: order_67890
                reference:
                  type: string
                  description: A reference string for this payment method.
                  example: pm_ref_12345
                underlying_network_id:
                  type: string
                  description: The underlying network transaction ID.
                  example: ntxn_abc123
            example:
              type: card
              card:
                type: token
                token: vault_token_abc123
                name: John Doe
                billing_address:
                  first_name: John
                  last_name: Doe
                  line1: 123 Main St
                  city: San Francisco
                  state: CA
                  postal_code: '94105'
                  country: US
              customer_reference_id: customer_12345
              metadata:
                order_id: order_67890
      responses:
        '201':
          description: Returns the imported payment method object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/payment-method'
              example:
                id: pm_card_296645958265997316
                resource: payment_method
                type: card
                card:
                  brand: visa
