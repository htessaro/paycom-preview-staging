        token:
          type: string
          description: Token identifier for the card payment method.
          example: tok_card_296645958265997326
        three_ds:
          $ref: '#/components/schemas/three-ds-details'
          description: Populated if this payment used 3D Secure authentication (new fields format).
        name_verification:
          type: string
          description: Result of name verification using ANI (Account Name Inquiry).
