  /sessions/payment:
    post:
      summary: Create a Payment Session
      description: Creates a new payment session.
      operationId: create-ps
      tags:
        - PaymentSessions
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount to collect, in the smallest currency unit.
                  examples:
                    - 10000
                currency:
                  type: string
                  description: Three-letter ISO currency code, in lowercase.
                  examples:
                    - usd
                customer_reference_id:
                  type: string
                  description: Your unique identifier for the customer, used to retrieve and manage saved payment methods.
                  examples:
                    - 927071e4-464c-4f5d-a079-4aa097f922ca
                billing_details:
                  $ref: '#/components/schemas/billing-details'
                capture:
                  type: boolean
                  description: Whether to immediately capture the payment. If false, creates a hold.
                description:
                  type: string
                  description: An arbitrary string attached to the object, useful for displaying to users.
                payment_method_options:
                  $ref: '#/components/schemas/payment-method-options'
                payment_method_types:
                  type: array
                  description: The list of payment method types allowed for this session. Defaults to ["card"].
                  items:
                    type: string
                    examples:
                      - card
                reference:
                  type: string
                  description: A unique string to reference the payment session, useful for reconciliation with your internal systems.
                shipping:
                  $ref: '#/components/schemas/shipping-details'
                setup_future_usage:
                  type: string
                  description: Indicates intent to use this payment method for future payments.
