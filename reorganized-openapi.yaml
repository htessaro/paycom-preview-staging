    security-checks:
      type: object
      description: Configuration for security checks to perform.
      properties:
        address_line1_check:
          type: boolean
          description: Whether to perform AVS check for address line 1.
        address_postal_code_check:
          type: boolean
          description: Whether to perform AVS check for postal code.
        cvv_check:
          type: boolean
          description: Whether to perform CVV check.
    network-token-payment-method-options:
      type: object
      description: Options for network tokens for this payment.
      properties:
        provision:
          type: object
          description: Options that indicate how to provision network tokens.
          properties:
            enabled:
              type: boolean
              description: Indicates whether a network token should be provisioned during the payment.
            decline_on_failure:
              type: boolean
              description: Indicates whether a payment should fail if network token provisioning was not successful.
        authorization:
          type: object
          description: Options that indicate how to use network token for this payment.
          properties:
            enabled:
              type: boolean
              description: Indicates whether to use a network token for payment authorization.
            full_pan_fallback:
              type: boolean
              description: Indicates whether a retry with full pan should be performed in case authorization with network token failed.
    risk-control-payment-method-options:
      type: array
      description: Payment risk options.
      items:
        type: object
        description: Risk control range option.
        properties:
          start:
            type: integer
            minimum: 0
            maximum: 100
            format: int32
            description: Range beginning for risk control outcome.
          end:
            type: integer
            minimum: 0
            maximum: 100
            format: int32
            description: Range ending for risk control outcome.
          outcome:
            type: string
            description: Outcome.
            enum:
              - three_ds_exemption
              - three_ds_not_required
              - allow
              - require_three_ds
              - three_ds_challenge
              - block
        required:
          - start
          - end
          - outcome
    advanced-fraud-screening-payment-method-options:
      type: object
      description: Payment fraud screening options.
      properties:
        thresholds:
          $ref: '#/components/schemas/risk-control-payment-method-options'
        enabled:
          type: boolean
          description: Indicates whether payment method options fraud screening enabled.
        learn_mode:
          type: boolean
          description: Indicates whether payment method options fraud screening should be enabled in learn mode.
      required:
        - enabled
    ani-results-breakdown-values:
      type: string
      description: ANI results breakdown values to accept for verification.
      example: match
      enum:
        - match
        - no_match
        - partial_match
    accepted-ani-results-breakdown:
      type: object
      description: Indicates which result to accept in case of use verification with ANI payment method options.
      properties:
        first_name:
          type: array
          items:
            $ref: '#/components/schemas/ani-results-breakdown-values'
        last_name:
          type: array
          items:
            $ref: '#/components/schemas/ani-results-breakdown-values'
        middle_name:
          type: array
          items:
            $ref: '#/components/schemas/ani-results-breakdown-values'
        full_name:
          type: array
          items:
            $ref: '#/components/schemas/ani-results-breakdown-values'
    name-verification-payment-method-options:
      type: object
      description: Options to configure name verification process.
      properties:
        enabled:
          type: boolean
          description: Whether to perform card verification with ANI.
        use_customer_name:
          type: boolean
          description: Whether to use the customer name for verification with ANI.
        accepted_results:
          type: array
          items:
            type: string
            enum:
              - match
              - partial_match
              - no_match
              - not_performed
              - not_supported
        accepted_results_by_field:
          $ref: '#/components/schemas/accepted-ani-results-breakdown'
    card-payment-method-options:
      type: object
      description: Options for Card payments.
      properties:
        accepted_card_brands:
          type: array
          description: List of card brands to accept for this payment.
          items:
            type: string
            description: The brand of the card.
            enum:
              - visa
              - mastercard
              - amex
              - discover
              - unionpay
              - jcb
        accepted_card_funding:
          type: array
          description: List of card funding to accept for this payment.
          items:
            type: string
            description: Card funding type.
            enum:
              - debit
              - credit
              - prepaid
              - unknown
        accepted_card_jurisdictions:
          type: array
          description: List of payment jurisdictions to accept for this payment.
          items:
            type: string
            description: Card jurisdiction.
            enum:
              - domestic
              - international
              - intraregional
        accepted_card_categories:
          type: array
          description: List of card categories to accept for this payment.
          items:
            type: string
            description: Card category.
            enum:
              - consumer
              - business
        accepted_card_countries:
          type: array
          description: List of card countries to accept for this payment.
          items:
            $ref: '#/components/schemas/card-country'
        accepted_eci_values:
          type: array
          description: List of ECI values to accept for this payment.
          items:
            type: string
            description: ECI Indicator value.
            enum:
              - '00'
              - '01'
              - '02'
              - '05'
              - '06'
              - '07'
        enforce_customer_name_as_cardholder_name:
          type: boolean
          description: Whether to enforce the customer name as the card holder name.
        security_checks:
          $ref: '#/components/schemas/security-checks'
        request_sca_exemption:
          type: object
          description: Options for requesting SCA exemption.
          properties:
            sca_exemption_type:
              type: string
              enum:
                - low_value
                - transaction_risk_analysis
                - secure_corporate_process
